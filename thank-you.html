<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Justin David Sears Dance Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@300;400;500;600&amp;display=swap');

        .section-header {
            font-family: 'Playfair Display', Georgia, serif;
            letter-spacing: -0.02em;

        .gold-bg {
            background-color: #C9A227;
        }

<body class="bg-zinc-950 text-white font-sans antialiased min-h-screen flex items-center justify-center p-6">
    <main class="max-w-xl w-full text-center">
        <i class="fa-solid fa-check-circle text-[#C9A227] text-6xl mb-8"></i>
        <div class="uppercase tracking-[3px] text-xs text-[#C9A227] mb-4">Message Received</div>
        <h1 class="section-header text-4xl sm:text-5xl font-bold mb-6 text-[#F5F0E6]">Thank you</h1>
        <p class="text-lg text-zinc-300 leading-relaxed mb-10">
            Your message has been received. Justin will follow up soon.
        </p>

        <div class="text-sm text-zinc-500 space-y-1 mb-12">
            <p>Or reach Justin directly:</p>
            <a href="mailto:justindavidsears@icloud.com" class="block text-[#C9A227] hover:underline">justindavidsears@icloud.com</a>
            <a href="tel:4632549657" class="block text-[#C9A227] hover:underline">463.254.9657</a>
        </div>

        <a href="/"
           class="inline-block py-4 px-8 text-sm font-semibold tracking-[2px] gold-bg text-zinc-950 rounded-2xl hover:bg-[#A67C00] transition-colors">
            RETURN HOME
        </a>
    </main>
</body>
</html>
